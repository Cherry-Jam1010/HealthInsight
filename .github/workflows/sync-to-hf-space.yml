name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-to-hf-space:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate Hugging Face configuration
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ vars.HF_SPACE_ID }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "Missing GitHub Actions secret: HF_TOKEN"
            exit 1
          fi

          if [ -z "$HF_SPACE_ID" ]; then
            echo "Missing GitHub Actions variable: HF_SPACE_ID"
            exit 1
          fi

          case "$HF_SPACE_ID" in
            */*) ;;
            *)
              echo "HF_SPACE_ID must look like username/space-name"
              exit 1
              ;;
          esac

      - name: Build sync bundle
        run: |
          rm -rf /tmp/hf-space
          mkdir -p /tmp/hf-space
          cp -a . /tmp/hf-space/
          rm -rf /tmp/hf-space/.git /tmp/hf-space/.github
          rm -f /tmp/hf-space/data/*.xpt
          rm -f /tmp/hf-space/NHANES/*.xpt
          cp HF_SPACE_README.md /tmp/hf-space/README.md

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ vars.HF_SPACE_ID }}
        run: |
          HF_USERNAME="${HF_SPACE_ID%%/*}"

          cd /tmp/hf-space
          git init
          git checkout -b main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Sync from GitHub to Hugging Face Space"
          git remote add hf "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_ID}"
          git push --force hf main
